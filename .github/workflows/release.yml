name: Release APK Build

on:
  workflow_dispatch:
    inputs:
      supabase_url:
        description: 'Supabase Project URL'
        required: true
        type: string
      supabase_anon_key:
        description: 'Supabase Anon Key'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.0'
  BACKEND_URL: 'https://call-to-whatsapp-production.up.railway.app'

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            apps/flutter_app/.dart_tool
            apps/flutter_app/.packages
          key: ${{ runner.os }}-flutter-${{ hashFiles('apps/flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get Flutter dependencies
        run: |
          cd apps/flutter_app
          flutter pub get

      - name: Build Release APK
        run: |
          cd apps/flutter_app
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ inputs.supabase_url }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ inputs.supabase_anon_key }}" \
            --dart-define=API_BASE_URL="${{ env.BACKEND_URL }}/api/v1" \
            --dart-define=WS_URL="${{ env.BACKEND_URL }}/openwa" \
            --dart-define=APP_VERSION=1.0.0

      - name: Build Split APKs (ABI-specific)
        run: |
          cd apps/flutter_app
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="${{ inputs.supabase_url }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ inputs.supabase_anon_key }}" \
            --dart-define=API_BASE_URL="${{ env.BACKEND_URL }}/api/v1" \
            --dart-define=WS_URL="${{ env.BACKEND_URL }}/openwa" \
            --dart-define=APP_VERSION=1.0.0

      - name: Upload Release APK (Universal)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-universal
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-arm64-v8a
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-armeabi-v7a
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-x86_64
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: List Built APKs
        run: |
          echo "=== Built APKs ==="
          ls -la apps/flutter_app/build/app/outputs/flutter-apk/
