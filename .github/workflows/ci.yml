name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: '3.24.0'
  NODE_VERSION: '20'

jobs:
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            apps/flutter_app/.dart_tool
            apps/flutter_app/.packages
          key: ${{ runner.os }}-flutter-${{ hashFiles('apps/flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get Flutter dependencies
        run: |
          cd apps/flutter_app
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd apps/flutter_app
          flutter analyze

  flutter-build:
    name: Flutter Build
    runs-on: ubuntu-latest
    needs: flutter-analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            apps/flutter_app/.dart_tool
            apps/flutter_app/.packages
          key: ${{ runner.os }}-flutter-${{ hashFiles('apps/flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get Flutter dependencies
        run: |
          cd apps/flutter_app
          flutter pub get

      - name: Build Debug APK
        run: |
          cd apps/flutter_app
          flutter build apk --debug

      - name: Build Release APK
        run: |
          cd apps/flutter_app
          flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  backend-build:
    name: Backend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Get Backend Dependencies
        run: |
          cd apps/backend
          npm ci

      - name: Run Backend Lint
        run: |
          cd apps/backend
          npm run lint

      - name: Build Backend
        run: |
          cd apps/backend
          npm run build

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Get Backend Dependencies
        run: |
          cd apps/backend
          npm ci

      - name: Run Tests
        run: |
          cd apps/backend
          npm test

